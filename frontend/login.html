<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="logo">
    🔐
</div>

    <h1>Login To Your Account</h1>

    <form id="loginForm">


        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        Don't have an account?
        <a href="register.html">Register</a>
    </p>

</div>

<script src="js/login.js"></script>

</body>
</html>
