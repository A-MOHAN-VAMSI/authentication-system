<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="logo">
    🔐
</div>

    <h1>Create Account</h1>

    <form id="registerForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>

</div>

<script src="js/register.js"></script>

</body>
</html>
